<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise From Stranger</title>
    <style>
        :root {
            --bg-dark: #1a0f16;
            --accent-pink: #ff85a2;
            --hot-pink: #ff1f5a;
            --glow-pink: rgba(255, 133, 162, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 10%, #2d1b26 0%, #1a0f16 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Lamp Section --- */
        .lamp-container {
            margin-top: 5vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .lamp-shade {
            width: 140px; height: 90px;
            background: linear-gradient(to bottom, #331d29, #22131b);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            transition: 0.5s;
        }

        .lamp-on .lamp-shade {
            background: linear-gradient(to bottom, #4d2b3d, var(--accent-pink));
            box-shadow: 0 0 80px var(--glow-pink), 0 0 30px var(--hot-pink);
        }

        .lamp-stem { width: 8px; height: 110px; background: linear-gradient(to right, #22131b, #4d2b3d, #22131b); }
        .lamp-base {
            width: 160px; height: 50px; background: #22131b; border-radius: 12px 12px 4px 4px;
            display: flex; justify-content: center; align-items: center; border: 1px solid #331d29;
        }

        .press-me-btn {
            width: 110px; height: 30px; background: linear-gradient(145deg, #331d29, #1a0f16);
            border-radius: 6px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            border: 1px solid #4d2b3d; box-shadow: 0 4px 0 #000; transition: all 0.1s;
        }

        .press-me-btn span { color: var(--accent-pink); font-size: 11px; font-weight: bold; letter-spacing: 1.5px; }

        /* --- THE CONTENT WRAPPER --- */
        /* This keeps the card and quote grouped together and centered */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1; 
            width: 100%;
            padding-bottom: 50px;
        }

        /* --- Login Card --- */
        .login-card {
            background: rgba(45, 27, 38, 0.2);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 133, 162, 0.15);
            width: 320px;
            text-align: center;
            /* Hidden initially */
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            margin-bottom: 30px; /* Space between card and quote */
        }

        .lamp-on .login-card {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h2 { color: #fff; font-weight: 200; margin-bottom: 30px; letter-spacing: 3px; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 133, 162, 0.1); border-radius: 10px; color: #fff; box-sizing: border-box; outline: none; }
        .login-submit { width: 100%; padding: 15px; background: var(--accent-pink); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }

        /* --- THE QUOTE --- */
        .footer-quote {
            color: #ffffff;
            font-size: 0.9rem;
            font-style: italic;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.8s ease;
        }

        @media (max-width: 480px) {
            .login-card { width: 80%; padding: 30px 20px; }
            .footer-quote { font-size: 0.8rem; width: 85%; }
        }
    </style>
</head>
<body>

    <div class="lamp-container">
        <div class="lamp-shade"></div>
        <div class="lamp-stem"></div>
        <div class="lamp-base">
            <div class="press-me-btn" onclick="toggleLamp()">
                <span>Press Me</span>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="login-card">
            <h2>Hey, Kajal!</h2>
            <input type="text" id="nameInput" placeholder="Username">
            <input type="password" id="dobInput" placeholder="Password">
            <button class="login-submit" onclick="checkAccess()">Login</button>
        </div>

        <div class="footer-quote">
            "There’s a strange peace in not connecting the dots—until the moment you do, and the reality changes everything."
        </div>
    </div>

    <script>
        function toggleLamp() {
            document.body.classList.toggle('lamp-on');
        }

        function checkAccess() {
            var nameInput = document.getElementById("nameInput");
            var dobInput = document.getElementById("dobInput");
            if (nameInput.value.toLowerCase().trim() === "kajal_15" && dobInput.value.trim() === "04152005") {
                window.location.href = "https://surprisefromstranger.my.canva.site/";
            } else {
                alert("Only the birthday girl can enter!");
            }
        }
    </script>
</body>
</html>v
