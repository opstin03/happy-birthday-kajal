<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise From Stranger</title>
    <style>
        :root {
            --bg-dark: #1a0f16; /* Deep plum/black for contrast */
            --accent-pink: #ff85a2; /* Soft rose pink */
            --hot-pink: #ff1f5a; /* For the glow */
            --glass-white: rgba(255, 255, 255, 0.05);
            --glow-pink: rgba(255, 133, 162, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 10%, #2d1b26 0%, #1a0f16 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* --- Lamp Section (Rose Gold Aesthetic) --- */
        .lamp-container {
            position: absolute;
            top: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .lamp-shade {
            width: 140px;
            height: 90px;
            background: linear-gradient(to bottom, #331d29, #22131b);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }

        .lamp-on .lamp-shade {
            background: linear-gradient(to bottom, #4d2b3d, var(--accent-pink));
            box-shadow: 0 0 80px var(--glow-pink), 0 0 30px var(--hot-pink);
        }

        .lamp-stem {
            width: 8px;
            height: 110px;
            background: linear-gradient(to right, #22131b, #4d2b3d, #22131b);
        }

        .lamp-base {
            width: 160px;
            height: 50px;
            background: #22131b;
            border-radius: 12px 12px 4px 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #331d29;
        }

        /* --- "PRESS ME" TACTILE BUTTON --- */
        .press-me-btn {
            width: 110px;
            height: 30px;
            background: linear-gradient(145deg, #331d29, #1a0f16);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #4d2b3d;
            box-shadow: 
                0 4px 0 #000, 
                0 6px 10px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            user-select: none;
        }

        .press-me-btn span {
            color: var(--accent-pink);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .press-me-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000;
        }

        .lamp-on .press-me-btn {
            border-color: var(--hot-pink);
            box-shadow: 0 0 15px rgba(255, 31, 90, 0.4), inset 0 0 5px rgba(255, 31, 90, 0.2);
        }

        .lamp-on .press-me-btn span {
            color: #fff;
            text-shadow: 0 0 8px var(--hot-pink);
        }

        /* --- Pink Volumetric Beam --- */
        .light-beam {
            position: absolute;
            top: 90px;
            width: 400px;
            height: 800px;
            background: radial-gradient(ellipse at top, rgba(255, 133, 162, 0.6), transparent 70%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            opacity: 0;
            pointer-events: none;
            transition: 0.8s ease;
        }

        .lamp-on .light-beam { opacity: 1; }

        /* --- Glassmorphism Login Card --- */
        .login-card {
            background: rgba(45, 27, 38, 0.2);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 133, 162, 0.15);
            width: 320px;
            transform: translateY(-120vh) rotateX(20deg);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
            text-align: center;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.7),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            opacity: 0;
        }

        .lamp-on .login-card {
            transform: translateY(140px) rotateX(0deg);
            opacity: 1;
        }

        h2 { 
            color: #fff; 
            font-weight: 200; 
            margin-bottom: 35px; 
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--glow-pink);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 133, 162, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 133, 162, 0.08);
            border-color: var(--accent-pink);
        }

        .login-submit {
            width: 100%;
            padding: 15px;
            background: var(--accent-pink);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.2);
            transition: 0.3s;
        }

        .login-submit:hover {
            background: var(--hot-pink);
            box-shadow: 0 10px 25px rgba(255, 31, 90, 0.4);
            transform: translateY(-2px);
        }

/* Add this inside your <style> tags */

@media (max-width: 480px) {
    h2 {
        font-size: 1.2rem; /* Shrinks the text on mobile */
        letter-spacing: 1px; /* Reduces spacing to save width */
        margin-bottom: 20px;
    }
    
    .login-card {
        width: 85%; /* Makes the card fit better on mobile screens */
        padding: 30px 20px;
    }
}
    </style>
</head>
<body>

    <div class="lamp-container" id="lamp">
        <div class="lamp-shade"></div>
        <div class="lamp-stem"></div>
        <div class="lamp-base">
            <div class="press-me-btn" onclick="toggleLamp()">
                <span>Press Me</span>
            </div>
        </div>
        <div class="light-beam"></div>
    </div>

    <div class="login-card">
        <h2>WELCOME KAMMO JI</h2>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="dobInput" placeholder="Password">
        </div>
        <button class="login-submit" onclick="checkAccess()">Login</button>
    </div>

    <script>
        function toggleLamp() {
            document.body.classList.toggle('lamp-on');
        }

        function checkAccess() {
            var nameInput = document.getElementById("nameInput");
            var dobInput = document.getElementById("dobInput");

            // Safety check: make sure the elements exist before grabbing values
            if (!nameInput || !dobInput) return;

            var name = nameInput.value.toLowerCase().trim();
            var dob = dobInput.value.trim();

            var secretName = "kajal_15"; 
            var secretDOB = "04152005"; 
            var canvaLink = "https://surprisefromstranger.my.canva.site/";

            if (name === secretName && dob === secretDOB) {
                window.location.href = canvaLink;
            } else {
                alert("Only the birthday girl can enter! Check your details.");
            }
        }
    </script>
</body>
